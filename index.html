<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Japans Wandelen</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>

<body>

  <button class="history-button" id="openHistory">
    <i class="fa-solid fa-clock-rotate-left"></i>
  </button>

  <button class="settings-button" id="openSettings">
    <i class="fa-solid fa-gear"></i>
  </button>

  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <h2>Geschiedenis</h2>
      <button class="close-history" id="closeHistory">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div id="historyList" class="history-list">
      </div>
    <button class="clear-history-btn" id="clearHistoryBtn">Geschiedenis wissen</button>
  </div>

  <div class="settings-panel" id="settingsPanel">

    <div class="settings-header">
      <h2>Instellingen</h2>
      <button class="close-settings" id="closeSettings">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="setting">
      <label>Starten met tempo</label>
      <select id="startTempo">
        <option value="snel">Snel tempo</option>
        <option value="traag">Traag tempo</option>
      </select>
    </div>

    <div class="setting">
      <label>Tijd snel tempo</label>
      <div class="time-spinner-group">
        <input type="number" id="snelMinuten" value="3" min="0" max="59"> <span>min</span>
        <input type="number" id="snelSeconden" value="0" min="0" max="59"> <span>sec</span>
      </div>
    </div>

    <div class="setting">
      <label>Tijd traag tempo</label>
      <div class="time-spinner-group">
        <input type="number" id="traagMinuten" value="3" min="0" max="59"> <span>min</span>
        <input type="number" id="traagSeconden" value="0" min="0" max="59"> <span>sec</span>
      </div>
    </div>

    <div class="setting">
      <label>Totale tijd (minuten)</label>
      <input type="number" id="totaleTijd" value="30" min="1">
    </div>

    <div class="setting">
      <label>Gesproken meldingen</label>
      <select id="gesprokenMeldingen">
        <option>Aan</option>
        <option>Uit</option>
      </select>
    </div>

    <div class="setting">
      <label>Pieptonen</label>
      <select id="piepjes">
        <option>Aan</option>
        <option>Uit</option>
      </select>
    </div>

    <div class="setting">
      <label>Trillen (gsm)</label>
      <select id="trillen">
        <option>Aan</option>
        <option>Uit</option>
      </select>
    </div>

  </div>

  <div class="timer-card">

    <div id="timerRunningView">
      <div class="mode-title">
        SNEL
      </div>

      <div class="main-timer" id="mainTimer">
        30:00
      </div>

      <div class="phase">
        Fase: <span id="phaseTimer">03:00</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="info-row">
        <div>
          <span class="label">Ronde:</span>
          <span id="setInfo">1 / 5</span>
        </div>
        <div>
          <span class="label">Afstand:</span>
          <span id="distanceInfo">0.00 km</span>
        </div>
        <div>
          <span class="label">Resterend:</span>
          <span id="remainingInfo">30:00</span>
        </div>
      </div>

      <div class="buttons">
        <button class="start-btn" id="startBtn">
          <i class="fa-solid fa-play"></i> Start
        </button>
        <button class="reset-btn" id="resetBtn">
          <i class="fa-solid fa-rotate-left"></i> Opnieuw
        </button>
      </div>
    </div>

    <div id="summaryView" class="summary-view" style="display: none;">
      <div class="summary-icon">
        <i class="fa-solid fa-square-check"></i>
      </div>
      <h2 class="summary-title">Goed gedaan!</h2>
      <p class="summary-subtitle">Je hebt je Japanse wandeling voltooid.</p>

      <div class="summary-stats">
        <div class="stat-box">
          <span class="stat-val" id="sumTotalTime">30</span>
          <span class="stat-lbl">minuten</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="sumDistance">0.00</span>
          <span class="stat-lbl">kilometer</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="sumIntervals">3:00</span>
          <span class="stat-lbl">snel / traag</span>
        </div>
      </div>

      <div class="buttons">
        <button class="save-btn" id="saveWalkBtn">
          <i class="fa-solid fa-bookmark"></i> Opslaan
        </button>
        <button class="close-btn" id="closeWalkBtn">
          Sluiten
        </button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
